# Database Configuration
# Primary: use the unified SPRING_DATASOURCE_URL if provided
# Fallback: construct from individual components
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:autorack.proxy.rlwy.net}:${MYSQLPORT:46431}/${MYSQLDATABASE:railway}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:nKnUUyMLBGLhlpIhLfZsWHSHvjmWVvpG}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Automatic Database Initialization
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# Error handling
serverstar.error.include-message=always    

